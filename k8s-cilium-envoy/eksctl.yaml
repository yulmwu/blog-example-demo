apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: cilium-poc
  region: ap-northeast-2
  version: "1.35"

iam:
  withOIDC: true

managedNodeGroups:
  - name: ng-poc
    instanceType: t3.medium
    desiredCapacity: 1
    minSize: 1
    maxSize: 2

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
